<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="16" ry="16" fill="#08080f"/>

  <!-- scattered dim points -->
  <circle cx="45" cy="180" r="3" fill="#334155"/>
  <circle cx="195" cy="55" r="3" fill="#334155"/>
  <circle cx="210" cy="195" r="3" fill="#334155"/>
  <circle cx="60" cy="45" r="3" fill="#334155"/>
  <circle cx="175" cy="210" r="3" fill="#334155"/>
  <circle cx="40" cy="110" r="3" fill="#334155"/>

  <!-- radius query circle -->
  <circle cx="128" cy="128" r="55" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- points inside radius - highlighted -->
  <circle cx="110" cy="115" r="4" fill="#06b6d4"/>
  <circle cx="145" cy="140" r="4" fill="#06b6d4"/>
  <circle cx="128" cy="100" r="4" fill="#06b6d4"/>
  <circle cx="155" cy="118" r="4" fill="#06b6d4"/>
  <circle cx="105" cy="148" r="4" fill="#06b6d4"/>

  <!-- ray line -->
  <line x1="28" y1="210" x2="228" y2="60" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>

  <!-- ray hit points -->
  <circle cx="85" cy="170" r="4" fill="#8b5cf6"/>
  <circle cx="160" cy="108" r="4" fill="#8b5cf6"/>

  <!-- query origin crosshair -->
  <line x1="122" y1="128" x2="134" y2="128" stroke="#e2e8f0" stroke-width="1" opacity="0.6"/>
  <line x1="128" y1="122" x2="128" y2="134" stroke="#e2e8f0" stroke-width="1" opacity="0.6"/>
</svg>
